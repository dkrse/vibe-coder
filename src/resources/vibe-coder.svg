<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44" fill="#1a1a2e"/>

  <!-- Sound/vibe waves -->
  <!-- Top wave -->
  <path d="M 44 100 Q 76 68, 108 100 Q 140 132, 172 100 Q 204 68, 220 100"
        fill="none" stroke="#a855f7" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <!-- Middle wave (main) -->
  <path d="M 36 128 Q 72 80, 108 128 Q 144 176, 180 128 Q 216 80, 224 128"
        fill="none" stroke="#c084fc" stroke-width="14" stroke-linecap="round"/>
  <!-- Bottom wave -->
  <path d="M 44 156 Q 76 188, 108 156 Q 140 124, 172 156 Q 204 188, 220 156"
        fill="none" stroke="#22d3ee" stroke-width="10" stroke-linecap="round" opacity="0.45"/>

  <!-- Text cursor -->
  <rect x="122" y="92" width="5" height="72" rx="2.5" fill="#67e8f9"/>

  <!-- Dot accents -->
  <circle cx="52" cy="128" r="5" fill="#a855f7" opacity="0.7"/>
  <circle cx="216" cy="128" r="5" fill="#22d3ee" opacity="0.7"/>
